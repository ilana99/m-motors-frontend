<main>
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" routerLink="/">M-motors</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse ms-auto" id="navbarNav">
        <div class="navbar-nav ms-auto">
          @if (!auth.loggedIn()) {
          <a class="nav-link" routerLink="/login">Se connecter</a>
          <a class="nav-link" routerLink="/signup">S'inscrire</a>
          }
          @if (auth.loggedIn()) {
          <a class="nav-link" routerLink="/profil"><i class="bi bi-person-circle"></i></a>
          <a class="nav-link" href="" (click)="logout($event)"><i class="bi bi-box-arrow-right"></i></a>
          }
        </div>

      </div>
    </div>
  </nav>
  <router-outlet></router-outlet>
</main>
<app-footer></app-footer>
