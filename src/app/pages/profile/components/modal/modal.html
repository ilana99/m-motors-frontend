<div class="modal d-block" tabindex="-1" role="dialog">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Annuler le dossier client</h5>
                <button type="button" class="btn-close" aria-label="Close" (click)="closeModal.emit()"></button>
            </div>
            <div class="modal-body">
                <p>Voulez-vous vraiment annuler ce dossier client?</p>
                @if (clientfile) {
                <p class="mb-0 fw-semibold">{{ clientfile.car.brand }} {{ clientfile.car.model }}</p>
                }
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" (click)="closeModal.emit()">Retour</button>
                <button type="button" class="btn btn-danger" (click)="confirmCancel.emit()">Annuler le dossier</button>
            </div>
        </div>
    </div>
</div>
<div class="modal-backdrop show"></div>
